version: '3'

tasks:
  current:
    desc: Generate current version of the template
    cmds:
      - rm -rf tmp/current
      - uv run copier copy {{.CLI_ARGS}} --vcs-ref HEAD . tmp/current

  diff:
    desc: Compare last version to HEAD
    cmds:
      - rm -rf tmp/before
      - rm -rf tmp/after
      - uv run copier copy {{.CLI_ARGS}} . tmp/before
      - uv run copier copy {{.CLI_ARGS}} --vcs-ref HEAD . tmp/after
      - diff tmp/before tmp/after
