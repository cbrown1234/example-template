---
name: Tests

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PREK_HOME: .cache/prek

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # All git tags needed for copier

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.6"
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2
        with:
          version: "3.48.0"

      - name: Cache prek
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ env.PREK_HOME }}
          key: prek-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            prek-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Setup environment
        run: task dev-setup:venv
        env:
          UV_PYTHON: ${{ matrix.python-version }}

      - name: Run tests
        run: task test
        env:
          UV_PYTHON: ${{ matrix.python-version }}
